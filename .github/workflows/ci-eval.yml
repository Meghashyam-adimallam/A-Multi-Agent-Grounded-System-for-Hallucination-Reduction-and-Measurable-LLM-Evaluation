# CI Evaluation Gate — blocks merge if hallucination benchmark fails
name: CI Evaluation Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  hallucination-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PyTorch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langchain langchain-community langchain-openai langchain-text-splitters pypdf rank_bm25 faiss-cpu sentence-transformers fastapi uvicorn python-dotenv

      - name: Index documents
        run: python scripts/index_documents.py

      - name: Run hallucination benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_benchmark.py --condition multi --limit 3
